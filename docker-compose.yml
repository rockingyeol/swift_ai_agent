version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  prowide-svc:
    build: ./prowide-svc
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local

  swift-agent:
    build: .
    depends_on:
      - qdrant
      - prowide-svc
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data

volumes:
  qdrant_data:
